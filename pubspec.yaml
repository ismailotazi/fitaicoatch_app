name: fitaicoatch_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2  

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  flutter_gen: ^5.13.0+1
  shared_preferences: ^2.5.5
  rename: ^3.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#ffffff"
  image: images/off_splash.jpg
  android: true
  ios: true

  android_12:
    image: images/off_splash.jpg
    color: "#ffffff"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/icon.png"

flutter:
  uses-material-design: true

  assets:
    - images/
  generate: true